{% extends "base.html" %}
{% block title %}New scan · {{ scanner.name }}{% endblock %}
{% block content %}
<section class="hero">
  <span class="mono">// {{ scanner.slug }}</span>
  <h1>Upload a document</h1>
  <p class="muted">Supported: PDF, PNG, JPEG, WEBP, TIFF.</p>
</section>

<div class="spacer"></div>

<div class="card" style="max-width: 640px;">
<form method="post" enctype="multipart/form-data">{% csrf_token %}
  <div class="field">
    <label>File</label>
    {{ form.file }}{{ form.file.errors }}
  </div>
  <button class="btn-primary" type="submit">Upload &amp; scan</button>
  <a class="btn-ghost" href="{% url 'web:scanner_detail' account_slug=account.slug scanner_slug=scanner.slug %}">Cancel</a>
</form>
</div>
{% endblock %}
